<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Telecode Workspace OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
  :root {
    --bg: #0b0e14; --sidebar: #151921; --card: #1c2128; --border: #30363d;
    --text: #adbac7; --text-bright: #cdd9e5; --muted: #768390;
    --accent: #539bf5; --success: #57ab5a; --error: #e5534b; --warn: #c69026;
    --blocked: #3a302a; --todo: #343942; --inprogress: #1e3a5f; --done: #1b4721;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  
  body {
    margin: 0; font-family: var(--font-sans);
    background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  
  aside {
    width: 280px; background: var(--sidebar); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .side-hdr { padding: 20px; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-bright); display: flex; align-items: center; gap: 10px; font-size: 15px; }
  .side-sec { padding: 16px; flex: 1; overflow-y: auto; }
  .side-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin: 24px 0 12px 4px; letter-spacing: 0.1em; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  
  .side-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; 
    cursor: pointer; margin-bottom: 4px; transition: 0.2s; font-size: 13px;
    border: 1px solid transparent; color: var(--text); position: relative;
  }
  .side-item:hover { background: rgba(255,255,255,0.05); color: var(--text-bright); }
  .side-item.active { background: rgba(83,155,245,0.1); color: var(--accent); border-color: rgba(83,155,245,0.2); }
  .side-item .trash { position: absolute; right: 8px; opacity: 0; transition: 0.2s; color: var(--error); }
  .side-item:hover .trash { opacity: 0.7; }
  
  .avatar { width: 28px; height: 28px; border-radius: 6px; background: #22272e; display: flex; align-items: center; justify-content: center; font-size: 15px; border: 1px solid var(--border); }
  .avatar-unassigned { border-style: dashed; color: var(--muted); background: transparent; }

  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .top-bar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 10; }
  
  .board { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #0d1117; display: none; }
  
  .swimlane { display: flex; border-bottom: 1px solid var(--border); min-height: 100px; flex-shrink: 0; }
  .swimlane:hover { background: rgba(255,255,255,0.01); }
  
  .lane-rail { 
    width: 60px; flex-shrink: 0; background: rgba(0,0,0,0.2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 0; gap: 8px;
  }
  .lane-label { 
    writing-mode: vertical-rl; text-transform: uppercase; font-size: 11px; font-weight: 700; 
    letter-spacing: 0.2em; color: var(--muted); transform: rotate(180deg); white-space: nowrap;
  }
  .lane-count { font-size: 10px; font-weight: 700; color: var(--accent); background: rgba(83,155,245,0.1); padding: 2px 6px; border-radius: 4px; }

  .lane-content { padding: 20px; flex: 1; display: flex; flex-wrap: wrap; gap: 16px; align-content: flex-start; }

  .card { 
    background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; 
    width: 280px; cursor: grab; transition: 0.15s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
    position: relative; display: flex; flex-direction: column; gap: 10px;
  }
  .card:active { cursor: grabbing; }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-title { font-size: 13px; color: var(--text-bright); font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
  .card-specialist { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }

  .flyout { position: absolute; top: 0; right: -900px; width: 900px; height: 100%; background: var(--bg); border-left: 1px solid var(--border); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
  .flyout.open { right: 0; }
  .flyout-hdr { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .flyout-body { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  
  .terminal { background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; color: #eee; overflow-y: auto; max-height: 350px; }
  .file-tree { border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: rgba(0,0,0,0.2); max-height: 250px; overflow-y: auto; }
  .file-item { display: flex; align-items: center; gap: 10px; padding: 6px; font-size: 13px; border-radius: 4px; color: var(--text); text-decoration: none; position: relative; }
  .file-item:hover { background: rgba(255,255,255,0.03); color: var(--accent); }
  .file-item .trash { position: absolute; right: 8px; opacity: 0; color: var(--error); transition: 0.2s; }
  .file-item:hover .trash { opacity: 0.7; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: var(--sidebar); border: 1px solid var(--border); border-radius: 12px; width: 700px; padding: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
  
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text-bright); outline: none; font-size: 14px; font-family: var(--font-sans); }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: #21262d; color: var(--text-bright); transition: 0.2s; }
  .btn:hover { background: #30363d; }
  .btn-primary { background: var(--accent); color: white; border: none; }
  .btn-danger { color: var(--error); border-color: rgba(218, 54, 51, 0.2); }
  
  #error-toast { position: fixed; bottom: 24px; right: 24px; background: var(--error); color: white; padding: 16px 24px; border-radius: 8px; display: none; z-index: 300; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; font-size: 13px; line-height: 1.5; }
  
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tab { padding: 8px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 0.05em; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>

<div id="error-toast"></div>

<aside>
  <div class="side-hdr"><i data-lucide="layers" style="color:var(--accent)"></i> Workspace OS</div>
  <div class="side-sec">
    <div class="side-label">Project Domains</div>
    <div id="workspaceList"></div>
    <button class="btn" style="width:100%; margin-top:12px;" onclick="createNewWorkspace()"><i data-lucide="plus"></i> New Workspace</button>
    
    <div class="side-label">Talent Roster</div>
    <div id="specialistRoster"></div>
    <button class="btn" style="width:100%; margin-top:12px;" onclick="openSpecialistModal()"><i data-lucide="user-plus"></i> Onboard Specialist</button>
  </div>
</aside>

<main>
  <div class="top-bar">
    <div style="display:flex; align-items:center; gap:12px">
      <i data-lucide="monitor" style="color:var(--accent); width:18px"></i>
      <h2 id="currentWorkspaceTitle" style="margin:0; font-size:16px; font-weight:600">Select Workspace</h2>
      <button id="govBtn" class="btn" style="padding:4px 10px; border-radius:6px; font-size:11px; display:none" onclick="openGovernance()"><i data-lucide="shield-check" style="width:12px"></i> Governance</button>
    </div>
    <div style="display:flex; gap:12px" id="mainActions">
      <button class="btn btn-icon" onclick="syncRelay()"><i data-lucide="rotate-cw" style="width:16px"></i></button>
      <button class="btn btn-primary" onclick="openTicketModal()"><i data-lucide="plus"></i> New Assignment</button>
    </div>
  </div>

  <div class="board" id="boardContent"></div>

  <div id="emptyState" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--muted); gap:20px;">
    <i data-lucide="layers" style="width:64px; height:64px; opacity:0.2"></i>
    <div style="text-align:center">
      <h3 style="margin:0; color:var(--text-bright)">No Workspace Active</h3>
      <p style="margin:8px 0 0; font-size:13px">Select a project domain from the sidebar to manage assignments.</p>
    </div>
  </div>

  <div class="flyout" id="flyout">
    <div class="flyout-hdr"><h3 id="flyTitle" style="margin:0"></h3><div style="display:flex; gap:8px"><button class="btn btn-danger" onclick="deleteCurrentTicket()"><i data-lucide="trash-2"></i></button><button class="btn" onclick="closeFlyout()"><i data-lucide="x"></i></button></div></div>
    <div class="flyout-body">
      <div style="background:rgba(255,255,255,0.02); padding:24px; border-radius:12px; border:1px solid var(--border)">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px">
          <div>
            <div id="flySpecialist" style="font-size:12px; color:var(--accent); font-weight:600; text-transform:uppercase; margin-bottom:4px"></div>
            <select id="swapSpecialist" style="width:auto; padding:4px 8px; font-size:11px" onchange="swapSpecialistOnTicket(this.value)"></select>
          </div>
          <div id="flyAction"></div>
        </div>
        <div id="flyPrompt" style="font-size:14px; line-height:1.6; color:var(--text-bright); white-space:pre-wrap"></div>
      </div>
      
      <div>
        <div class="tabs">
          <div class="tab active" id="tab-feed" onclick="switchFlyTab('feed')">Shift Feed</div>
          <div class="tab" id="tab-history" onclick="switchFlyTab('history')">Project Log</div>
        </div>
        <div class="terminal" id="flyLog"></div>
        <div class="terminal" id="flyHistory" style="display:none; background:rgba(0,0,0,0.3)"></div>
      </div>

      <div style="display:flex; gap:20px">
        <div style="flex:1"><div class="side-label">Project Vault</div><div class="file-tree" id="flyVault"></div></div>
        <div style="flex:1"><div class="side-label">Active Workspace</div><div class="file-tree" id="flyFiles"></div></div>
      </div>
    </div>
  </div>
</main>

<!-- Modals -->
<div class="modal-overlay" id="governanceModal">
  <div class="modal">
    <h3 style="margin-top:0">Project Governance</h3>
    <div style="display:flex; gap:24px">
      <div style="flex:1">
        <div class="field"><label>Domain Name</label><input type="text" id="govName" placeholder="Enter Workspace Name"></div>
        <div class="field"><label>Internal Identifier (Locked)</label><input type="text" id="govId" disabled></div>
        <div style="display:flex; gap:20px">
          <div class="field" style="flex:1"><label>Shift Limit (s)</label><input type="number" id="govShift"></div>
          <div class="field" style="flex:1"><label>Deadline (s)</label><input type="number" id="govDeadline"></div>
        </div>
      </div>
      <div style="flex:1">
        <div class="side-label">Knowledge Vault <button class="btn" style="padding:2px 6px; font-size:10px" onclick="document.getElementById('vaultUpload').click()"><i data-lucide="upload" style="width:10px"></i></button></div>
        <div class="file-tree" id="govVaultList" style="margin-bottom:20px"></div>
        <input type="file" id="vaultUpload" multiple style="display:none" onchange="uploadToVault(this.files)">
        <div class="side-label">Active Files <button class="btn" style="padding:2px 6px; font-size:10px" onclick="document.getElementById('wsUpload').click()"><i data-lucide="upload" style="width:10px"></i></button></div>
        <div class="file-tree" id="govWorkspaceList"></div>
        <input type="file" id="wsUpload" multiple style="display:none" onchange="uploadToWorkspace(this.files)">
      </div>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:32px; padding-top:20px; border-top:1px solid var(--border)">
      <button class="btn btn-danger" onclick="deleteCurrentWorkspace()"><i data-lucide="trash-2"></i> Terminate Project</button>
      <div style="display:flex; gap:12px"><button class="btn" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="submitGovernance()">Apply Governance</button></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="specialistModal">
  <div class="modal"><h3>Talent Onboarding</h3>
    <input type="hidden" id="sId">
    <div class="field"><label>Specialist Name</label><input type="text" id="sName"></div>
    <div class="field"><label>Agency Provider</label><select id="sType"><option value="CLAUDE_CODE">Claude Code</option><option value="GEMINI">Gemini CLI</option></select></div>
    <div class="field"><label>System Directives</label><textarea id="sInstr" rows="4"></textarea></div>
    <div class="field">
      <label>Work Files (Brought to every Shift)</label>
      <div id="equipmentList"></div>
      <button class="btn" style="font-size:11px; margin-top:8px" onclick="addEquipmentItem()"><i data-lucide="plus" style="width:12px"></i> Add File</button>
    </div>
    <div class="field" style="display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.2); padding:12px; border-radius:8px; margin-top:20px">
      <input type="checkbox" id="sLocal" checked style="width:auto"><label style="margin:0; text-transform:none">Direct Tool Access (Local Mode)</label>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px"><button class="btn" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="submitSpecialist()">Save Specialist</button></div>
  </div>
</div>

<div class="modal-overlay" id="ticketModal">
  <div class="modal" style="width:500px"><h3>Assign Assignment</h3>
    <div class="field"><label>Objective Title</label><input type="text" id="tTitle"></div>
    <div class="field"><label>Relay From</label><select id="tDepends"><option value="">No Dependency</option></select></div>
    <div class="field"><label>Assigned Specialist</label><select id="tAgentSelect"></select></div>
    <div class="field"><label>Detailed Requirement</label><textarea id="tPrompt" rows="5"></textarea></div>
    <div style="display:flex; justify-content:flex-end; gap:12px"><button class="btn" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="submitTicket()">Save Assignment</button></div>
  </div>
</div>

<script>
  let specialists = [], workspaces = [], board = {}, currentWorkspaceId = localStorage.getItem("telecode_wid") || "", currentTicketId = null;
  
  function showError(msg, tb="") {
    const toast = document.getElementById("error-toast");
    toast.innerHTML = `<strong>Error:</strong> ${msg}${tb ? '<pre style="font-size:10px; margin-top:10px; max-height:200px; overflow:auto">' + tb + '</pre>' : ''}`;
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 10000);
  }

  async function api(path, opts={}) { 
    if(opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body); 
    const r = await fetch(path, opts); 
    const text = await r.text();
    let data = {};
    try { data = JSON.parse(text); } catch(e) { showError(`Server returned invalid JSON (${r.status})`, text); throw e; }
    if (!r.ok) { showError(data.error || r.statusText, data.traceback); throw new Error(data.error); }
    return data;
  }

  function refreshIcons() { lucide.createIcons(); }
  async function init() { try { await loadWorkspaces(); } catch(e) {} try { await loadSpecialists(); } catch(e) {} try { await syncRelay(); } catch(e) {} setInterval(syncRelay, 10000); }

  async function loadWorkspaces() {
    const r = await api("/api/v1/workspaces"); workspaces = r.workspaces;
    document.getElementById("workspaceList").innerHTML = workspaces.map(w => `<div class="side-item ${w.id === currentWorkspaceId ? 'active' : ''}" onclick="switchWorkspace('${w.id}')"><i data-lucide="monitor"></i><span>${w.name}</span><i data-lucide="trash-2" class="trash" onclick="event.stopPropagation(); deleteWorkspace('${w.id}')"></i></div>`).join("");
    const curr = workspaces.find(w => w.id === currentWorkspaceId);
    if (curr) {
      document.getElementById("currentWorkspaceTitle").textContent = curr.name;
      document.getElementById("govBtn").style.display = "inline-flex";
      document.getElementById("mainActions").style.display = "flex";
      document.getElementById("boardContent").style.display = "flex";
      document.getElementById("emptyState").style.display = "none";
    } else {
      document.getElementById("currentWorkspaceTitle").textContent = "Select Workspace";
      document.getElementById("govBtn").style.display = "none";
      document.getElementById("mainActions").style.display = "none";
      document.getElementById("boardContent").style.display = "none";
      document.getElementById("emptyState").style.display = "flex";
    }
    refreshIcons();
  }

  async function loadSpecialists() {
    const r = await api("/api/v1/specialists"); specialists = r.specialists;
    const rosterHtml = specialists.map(s => `<div class="side-item" draggable="true" ondragstart="dragSpecialist(event, '${s.id}')" onclick="editSpecialist('${s.id}')"><div class="avatar">${s.avatar}</div><span>${s.name}</span><i data-lucide="trash-2" class="trash" onclick="event.stopPropagation(); fireSpecialist('${s.id}')"></i></div>`).join("");
    document.getElementById("specialistRoster").innerHTML = rosterHtml;
    const optionsHtml = '<option value="">(Unassigned)</option>' + specialists.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
    document.getElementById("swapSpecialist").innerHTML = optionsHtml;
    document.getElementById("tAgentSelect").innerHTML = optionsHtml;
    refreshIcons();
  }

  function renderBoardStructure() {
    const states = [
      {id: 'blocked', label: 'Blocked'},
      {id: 'todo', label: 'To Do'},
      {id: 'inprogress', label: 'In Shift'},
      {id: 'done', label: 'Done'},
      {id: 'failed', label: 'Downtime'}
    ];
    document.getElementById("boardContent").innerHTML = states.map(s => `
      <div class="swimlane" ondragover="event.preventDefault()" ondrop="dropToColumn(event, '${s.id}')">
        <div class="lane-rail"><div class="lane-label">${s.label}</div><div class="lane-count" id="${s.id}-count">0</div></div>
        <div class="lane-content" id="cnt-${s.id}"></div>
      </div>
    `).join("");
  }

  async function syncRelay() {
    if (!currentWorkspaceId) return;
    try {
      if (!document.getElementById("cnt-todo")) renderBoardStructure();
      await api("/api/v1/relay/sync", {method: "POST"});
      const r = await api(`/api/v1/workspaces/${currentWorkspaceId}/tickets`); board = r.board;
      ["blocked", "todo", "inprogress", "done", "failed"].forEach(status => {
        const countEl = document.getElementById(`${status}-count`);
        const cntEl = document.getElementById(`cnt-${status}`);
        if (countEl) countEl.textContent = (board[status]||[]).length;
        if (cntEl) cntEl.innerHTML = (board[status]||[]).map(t => {
          const s = specialists.find(x => x.id === t.agent_id);
          const avClass = s ? '' : 'avatar-unassigned';
          const avIcon = s ? s.avatar : '?';
          const avName = s ? s.name : 'Unassigned';
          return `<div class="card" draggable="true" ondragstart="dragTicket(event, '${t.id}')" ondragover="event.preventDefault()" ondrop="dropSpecialistToTicket(event, '${t.id}')" onclick="openTicket('${t.id}')">
            <div class="card-title">${t.title}</div>
            <div class="card-footer">
              <div class="card-specialist">
                <div class="avatar ${avClass}" style="width:18px; height:18px; font-size:10px">${avIcon}</div>
                <span>${avName}</span>
              </div>
            </div>
          </div>`;
        }).join("");
      });
      if (currentTicketId) refreshTicketDetail();
      if (document.getElementById("governanceModal").style.display === "flex") refreshGovFiles();
      refreshIcons();
    } catch(e) {}
  }

  function switchFlyTab(tab) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById(`tab-${tab}`).classList.add("active");
    document.getElementById("flyLog").style.display = tab === "feed" ? "block" : "none";
    document.getElementById("flyHistory").style.display = tab === "history" ? "block" : "none";
    if (tab === "history") refreshHistory();
  }

  async function refreshHistory() {
    if (!currentWorkspaceId) return;
    const r = await api(`/api/v1/workspaces/${currentWorkspaceId}/history`);
    document.getElementById("flyHistory").innerHTML = r.history.reverse().map(h => {
      const date = new Date(h.timestamp).toLocaleTimeString();
      return `<div style="font-size:11px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:4px"><span style="color:var(--muted)">[${date}]</span> <span style="color:var(--accent); font-weight:600">${h.type.toUpperCase()}</span>: ${h.message}</div>`;
    }).join("") || '<div style="color:var(--muted)">No activity recorded.</div>';
  }

  async function openTicket(id) {
    currentTicketId = id; const all = [].concat(...Object.values(board));
    const t = all.find(x => x.id === id); const s = specialists.find(x => x.id === t.agent_id) || {name: "Unassigned"};
    document.getElementById("flyTitle").textContent = t.title;
    document.getElementById("flySpecialist").textContent = `Specialist: ${s.name}`;
    document.getElementById("swapSpecialist").value = t.agent_id || "";
    document.getElementById("flyPrompt").textContent = t.prompt;
    const act = document.getElementById("flyAction");
    if (t.status === "todo") act.innerHTML = `<button class="btn btn-primary" onclick="startShift('${id}')"><i data-lucide="play"></i> Start Shift</button>`;
    else if (t.status === "inprogress") act.innerHTML = `<button class="btn btn-danger" onclick="pauseShift('${id}')"><i data-lucide="pause"></i> Pause Shift</button>`;
    else act.innerHTML = `<span class="badge" style="background:${t.status==='done'?'var(--success)':'var(--error)'}; color:white; padding:4px 12px">${t.status.toUpperCase()}</span>`;
    document.getElementById("flyout").classList.add("open");
    refreshTicketDetail();
  }

  async function refreshTicketDetail() {
    if (!currentTicketId) return;
    const t = [].concat(...Object.values(board)).find(x => x.id === currentTicketId);
    if (!t) return;
    try {
      const r = await fetch(`/api/sessions/${t.session_id}/files`).then(r => r.json());
      document.getElementById("flyVault").innerHTML = r.files.filter(f => f.path.startsWith(".vault/")).map(f => `<div class="file-item"><i data-lucide="book"></i> <span>${f.path.replace(".vault/","")}</span></div>`).join("") || '<div style="color:var(--muted);font-size:12px">Vault empty.</div>';
      document.getElementById("flyFiles").innerHTML = r.files.filter(f => !f.path.startsWith(".vault/")).map(f => `<a href="/api/sessions/${t.session_id}/files/${encodeURIComponent(f.path)}" target="_blank" class="file-item"><i data-lucide="file-text"></i> <span>${f.path}</span></a>`).join("");
      if (t.task_id) {
        const rT = await fetch(`/api/tasks/${t.task_id}`).then(r => r.json());
        document.getElementById("flyLog").innerHTML = (rT.metadata?.events || []).map(e => `<div style="font-size:10px; margin-bottom:4px"><span style="color:var(--muted)">[${e.kind}]</span> ${e.text||e.summary}</div>`).join("");
        document.getElementById("flyLog").scrollTop = 99999;
      } else { document.getElementById("flyLog").innerHTML = '<div style="color:var(--muted)">No active shift.</div>'; }
    } catch(e) {}
    refreshIcons();
  }

  async function refreshGovFiles() {
    if (!currentWorkspaceId) return;
    const r = await fetch(`/api/sessions/${currentWorkspaceId}/files`).then(r => r.json());
    const vault = r.files.filter(f => f.path.startsWith(".vault/"));
    const normal = r.files.filter(f => !f.path.startsWith(".vault/"));
    document.getElementById("govVaultList").innerHTML = vault.map(f => `<div class="file-item"><i data-lucide="book"></i> <span>${f.path.replace(".vault/","")}</span><i data-lucide="trash-2" class="trash" style="margin-left:auto" onclick="deleteFile('${f.path}')"></i></div>`).join("") || 'Vault empty.';
    document.getElementById("govWorkspaceList").innerHTML = normal.map(f => `<div class="file-item"><i data-lucide="file-text"></i> <span>${f.path}</span><i data-lucide="trash-2" class="trash" style="margin-left:auto" onclick="deleteFile('${f.path}')"></i></div>`).join("");
    refreshIcons();
  }

  function openGovernance() {
    if (!currentWorkspaceId) return;
    const w = workspaces.find(x => x.id === currentWorkspaceId);
    document.getElementById("govName").value = w.name;
    document.getElementById("govId").value = w.id;
    document.getElementById("govShift").value = w.governance.shift_limit || "";
    document.getElementById("govDeadline").value = w.governance.deadline || "";
    refreshGovFiles();
    document.getElementById("governanceModal").style.display = "flex";
  }

  async function submitGovernance() {
    await api(`/api/v1/workspaces/${currentWorkspaceId}`, {method: "PATCH", body: {name: document.getElementById("govName").value, shift_limit: document.getElementById("govShift").value, deadline: document.getElementById("govDeadline").value}});
    closeModals(); loadWorkspaces();
  }

  async function uploadToWorkspace(files) { for(let f of files) { const fd = new FormData(); fd.append("files", f); await fetch(`/api/sessions/${currentWorkspaceId}/files`, {method:"POST", body:fd}); } refreshGovFiles(); }
  async function uploadToVault(files) { for(let f of files) { const fd = new FormData(); fd.append("files", f, ".vault/"+f.name); await fetch(`/api/sessions/${currentWorkspaceId}/files`, {method:"POST", body:fd}); } refreshGovFiles(); }
  async function deleteFile(path) { if(confirm("Delete file?")) { await fetch(`/api/sessions/${currentWorkspaceId}/files/${encodeURIComponent(path)}`, {method:"DELETE"}); refreshGovFiles(); } }
  
  async function createNewWorkspace() { const name = prompt("Enter Project Name:"); if(name) { await api("/api/v1/workspaces", {method: "POST", body: {name}}); loadWorkspaces(); } }
  async function deleteWorkspace(id) { if(confirm("Terminate Project?")) { await api(`/api/v1/workspaces/${id}`, {method: "DELETE"}); if(currentWorkspaceId===id) currentWorkspaceId=""; loadWorkspaces(); syncRelay(); } }
  async function deleteCurrentWorkspace() { deleteWorkspace(currentWorkspaceId); closeModals(); }
  async function fireSpecialist(id) { if(confirm("Fire Specialist?")) { await api(`/api/v1/specialists/${id}`, {method: "DELETE"}); loadSpecialists(); } }
  
  function editSpecialist(id) { const s = specialists.find(x => x.id === id); document.getElementById("sId").value = s.id; document.getElementById("sName").value = s.name; document.getElementById("sType").value = s.task_type; document.getElementById("sInstr").value = s.instructions; document.getElementById("sLocal").checked = s.is_local; document.getElementById("equipmentList").innerHTML = ""; (s.equipment || []).forEach(e => addEquipmentItem(e.path, e.content)); document.getElementById("specialistModal").style.display = "flex"; }
  function addEquipmentItem(p="", c="") { const div = document.createElement("div"); div.style.display="flex"; div.style.gap="8px"; div.style.marginBottom="8px"; div.innerHTML = `<input type="text" placeholder="path" class="eq-path" value="${p}" style="flex:1"><textarea placeholder="content" class="eq-content" style="flex:2; height:32px">${c}</textarea><button class="btn" onclick="this.parentElement.remove()">X</button>`; document.getElementById("equipmentList").appendChild(div); }
  async function submitSpecialist() { const id = document.getElementById("sId").value; const equipment = Array.from(document.querySelectorAll("#equipmentList > div")).map(div => ({path: div.querySelector(".eq-path").value, content: div.querySelector(".eq-content").value})); const payload = {name: document.getElementById("sName").value, task_type: document.getElementById("sType").value, instructions: document.getElementById("sInstr").value, is_local: document.getElementById("sLocal").checked, equipment}; if (id) await api(`/api/v1/specialists/${id}`, {method: "PATCH", body: payload}); else await api("/api/v1/specialists", {method: "POST", body: payload}); closeModals(); loadSpecialists(); }
  function openTicketModal() { const all = [].concat(...Object.values(board)); document.getElementById("tDepends").innerHTML = '<option value="">No Dependency</option>' + all.map(t => `<option value="${t.id}">After: ${t.title}</option>`).join(""); document.getElementById("ticketModal").style.display = "flex"; }
  async function submitTicket() { await api(`/api/v1/workspaces/${currentWorkspaceId}/tickets`, {method: "POST", body: {title: document.getElementById("tTitle").value, specialist_id: document.getElementById("tAgentSelect").value, prompt: document.getElementById("tPrompt").value, depends_on: document.getElementById("tDepends").value}}); closeModals(); syncRelay(); }
  async function startShift(id) { await api(`/api/v1/tickets/${id}/start`, {method: "POST"}); syncRelay(); }
  async function pauseShift(id) { await api(`/api/v1/tickets/${id}/pause`, {method: "POST"}); syncRelay(); }
  async function deleteCurrentTicket() { if(confirm("Delete this assignment?")) { await api(`/api/v1/tickets/${currentTicketId}`, {method: "DELETE"}); closeFlyout(); syncRelay(); } }
  async function swapSpecialistOnTicket(sid) { await api(`/api/v1/tickets/${currentTicketId}`, {method: "PATCH", body: {agent_id: sid || null}}); openTicket(currentTicketId); syncRelay(); }
  function dragSpecialist(ev, id) { ev.dataTransfer.setData("specialist_id", id); }
  function dragTicket(ev, id) { ev.dataTransfer.setData("ticket_id", id); }
  async function dropSpecialistToTicket(ev, tid) { ev.preventDefault(); const sid = ev.dataTransfer.getData("specialist_id"); if(sid) { await api(`/api/v1/tickets/${tid}`, {method:"PATCH", body:{agent_id:sid}}); syncRelay(); } }
  async function dropToColumn(ev, status) { ev.preventDefault(); const tid = ev.dataTransfer.getData("ticket_id"); if(tid) { try { await api(`/api/v1/tickets/${tid}`, {method:"PATCH", body:{status:status}}); syncRelay(); } catch(e) {} } }
  function switchWorkspace(id) { currentWorkspaceId = id; localStorage.setItem("telecode_wid", id); loadWorkspaces(); syncRelay(); }
  function closeModals() { document.querySelectorAll(".modal-overlay").forEach(m => m.style.display = "none"); }
  function openSpecialistModal() { document.getElementById("sId").value=""; document.getElementById("equipmentList").innerHTML=""; document.getElementById("specialistModal").style.display="flex"; }
  function closeFlyout() { document.getElementById("flyout").classList.remove("open"); currentTicketId = null; }
  init();
</script>
</body>
</html>
